name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.mp4'
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  auto-install:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        cache: maven

    - name: Show environment info
      shell: bash
      run: |
        echo "OS: ${{ matrix.os }}"
        echo "Java: $(java -version 2>&1 | head -1)"
        echo "Arch: $(uname -m 2>/dev/null || echo 'N/A')"
        echo "JAVA_HOME: $JAVA_HOME"
        echo "PWD: $(pwd)"
        echo "Disk free:"
        df -h . 2>/dev/null || echo "N/A"

    - name: Diagnose Python runtime on failure
      if: failure()
      shell: bash
      run: |
        echo "=== Python runtime ==="
        ls -la ~/.jpy-ml/python/ 2>/dev/null || echo "No python dir"
        echo "=== Platform dir ==="
        PLATFORM=$(uname -m | sed 's/aarch64/arm64/' | sed 's/x86_64/x86_64/')
        if [ "$(uname)" = "Darwin" ]; then
          ls -la ~/.jpy-ml/python/macos-arm64/ 2>/dev/null || ls -la ~/.jpy-ml/python/macos-x86_64/ 2>/dev/null || echo "No macos dir"
        elif [ "$(expr substr $(uname -s) 1 5)" = "Linux" ]; then
          ls -la ~/.jpy-ml/python/linux-x86_64/ 2>/dev/null || ls -la ~/.jpy-ml/python/linux-aarch64/ 2>/dev/null || echo "No linux dir"
        fi
        echo "=== site-packages ==="
        find ~/.jpy-ml/python -name "site-packages" -type d 2>/dev/null
        echo "=== jep dir ==="
        find ~/.jpy-ml/python -path "*/jep" -type d 2>/dev/null
        echo "=== jep native libs ==="
        find ~/.jpy-ml/python -path "*/jep/*.so" -o -path "*/jep/*.jnilib" -o -path "*/jep/*.dll" 2>/dev/null || echo "No native libs found"
        echo "=== pip list ==="
        PYTHON_EXE=$(find ~/.jpy-ml/python -name "python3" -o -name "python.exe" 2>/dev/null | head -1)
        if [ -n "$PYTHON_EXE" ]; then
          echo "Using: $PYTHON_EXE"
          "$PYTHON_EXE" -m pip list 2>/dev/null || echo "pip list failed"
        else
          echo "No python executable found"
        fi

    - name: Cache Python runtime
      uses: actions/cache@v4
      with:
        path: ~/.jpy-ml/python
        key: jpy-ml-python-v3-${{ matrix.os }}-${{ hashFiles('src/main/resources/requirements.txt') }}

    - name: Set PYTHONHOME for macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if [ "$(uname -m)" = "arm64" ]; then
          echo "PYTHONHOME=$HOME/.jpy-ml/python/macos-arm64" >> $GITHUB_ENV
        else
          echo "PYTHONHOME=$HOME/.jpy-ml/python/macos-x86_64" >> $GITHUB_ENV
        fi

    - name: Run AutoInstallTest
      run: mvn -B test -Dtest=AutoInstallTest

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.os }}
        path: |
          target/surefire-reports/
          target/test-classes/
        retention-days: 7
