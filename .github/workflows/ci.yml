name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.mp4'
      - '**.jpg'
      - '**.jpeg'
      - '**.png'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  auto-install:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        cache: maven

    - name: Show environment info
      shell: bash
      run: |
        echo "OS: ${{ matrix.os }}"
        echo "Java: $(java -version 2>&1 | head -1)"
        echo "Arch: $(uname -m 2>/dev/null || echo 'N/A')"
        echo "PWD: $(pwd)"
        echo "Disk free:"
        df -h . 2>/dev/null || echo "N/A"

    - name: Cache Python runtime
      uses: actions/cache@v4
      with:
        path: ~/.jpy-ml/python
        key: jpy-ml-python-v2-${{ matrix.os }}-${{ hashFiles('src/main/resources/requirements.txt') }}

    - name: Run AutoInstallTest
      run: mvn -B test -Dtest=AutoInstallTest

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.os }}
        path: |
          target/surefire-reports/
          target/test-classes/
        retention-days: 7
