name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. 构建跨平台原生包
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            ext: zip
          - os: macos-latest
            platform: macos
            arch: aarch64
            ext: tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        cache: maven

    - name: Build CLI fat jar
      run: mvn -B package -Pcli -DskipTests

    - name: Create minimal JRE with jlink
      shell: bash
      run: |
        jlink \
          --module-path "$JAVA_HOME/jmods" \
          --add-modules java.base,java.desktop,java.logging,java.management,java.naming,java.net.http,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.xml,jdk.unsupported \
          --strip-native-commands \
          --no-header-files \
          --no-man-pages \
          --strip-debug \
          --compress zip-6 \
          --output jre-minimal

    - name: Assemble distribution (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        DIST_DIR=jpy-ml-${{ matrix.platform }}-${{ matrix.arch }}
        mkdir -p $DIST_DIR/bin $DIST_DIR/lib $DIST_DIR/jre
        cp target/jpy-ml-cli.jar $DIST_DIR/lib/
        cp -r jre-minimal/* $DIST_DIR/jre/

        cat > $DIST_DIR/bin/jpy-ml << 'LAUNCHER'
        #!/bin/bash
        DIR="$(cd "$(dirname "$0")" && pwd)"
        exec "$DIR/../jre/bin/java" -jar "$DIR/../lib/jpy-ml-cli.jar" "$@"
        LAUNCHER
        chmod +x $DIST_DIR/bin/jpy-ml

        tar czf jpy-ml-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz $DIST_DIR

    - name: Assemble distribution (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF -replace 'refs/tags/v',''
        $DIST_DIR = "jpy-ml-${{ matrix.platform }}-${{ matrix.arch }}"
        New-Item -ItemType Directory -Force -Path "$DIST_DIR\bin","$DIST_DIR\lib","$DIST_DIR\jre"
        Copy-Item target\jpy-ml-cli.jar "$DIST_DIR\lib\"
        Copy-Item -Recurse jre-minimal\* "$DIST_DIR\jre\"

        @"
        @echo off
        set DIR=%~dp0
        "%DIR%..\jre\bin\java.exe" -jar "%DIR%..\lib\jpy-ml-cli.jar" %*
        "@ | Out-File -Encoding ascii "$DIST_DIR\bin\jpy-ml.bat"

        Compress-Archive -Path $DIST_DIR\* -DestinationPath "jpy-ml-$VERSION-${{ matrix.platform }}-${{ matrix.arch }}.zip"

    - name: Upload native package
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ matrix.platform }}-${{ matrix.arch }}
        path: jpy-ml-*.${{ matrix.ext }}

  # 2. 发布到 Maven Central + 创建 GitHub Release
  release:
    needs: build-native
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        cache: maven
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Set version
      run: |
        mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }}
        mvn versions:commit

    - name: Publish to Maven Central
      run: mvn -B deploy -DskipTests
      env:
        MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    - name: Build CLI jar
      run: mvn -B package -Pcli -DskipTests

    - name: Download native packages
      uses: actions/download-artifact@v4
      with:
        path: native-packages
        pattern: native-*

    - name: List downloaded artifacts
      run: find native-packages -type f | head -20

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/jpy-ml-cli.jar
          bin/jpy-ml
          native-packages/**/*.tar.gz
          native-packages/**/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
